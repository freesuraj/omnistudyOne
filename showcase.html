<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="Omni screenshot showcase with scrollable previews of dashboards, quizzes, flashcards, mind maps, and audio analysis flows." />
    <meta name="robots" content="index,follow,max-image-preview:large" />
    <link rel="canonical" href="https://omnistudy.site/showcase.html" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Omni Screenshot Showcase" />
    <meta property="og:description" content="Scroll through the latest Omni app screenshots and feature previews." />
    <meta property="og:url" content="https://omnistudy.site/showcase.html" />
    <meta property="og:image" content="https://omnistudy.site/assets/screenshots/dashboard.png" />
    <meta property="og:site_name" content="Omni" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Omni Screenshot Showcase" />
    <meta name="twitter:description" content="Scroll through the latest Omni app screenshots and feature previews." />
    <meta name="twitter:image" content="https://omnistudy.site/assets/screenshots/dashboard.png" />
    <title>Omni Screenshot Showcase</title>
    <link rel="icon" type="image/png" href="assets/appIcon.png" />
    <link rel="apple-touch-icon" href="assets/appIcon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Sora:wght@500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "ImageGallery",
        "name": "Omni Screenshot Showcase",
        "url": "https://omnistudy.site/showcase.html",
        "description": "Gallery of Omni app screenshots including dashboard, quiz, flashcards, mind map, and audio analysis views."
      }
    </script>
  </head>
  <body>
    <div class="bg-sheen" aria-hidden="true"></div>
    <header class="topbar">
      <div class="container topbar__content">
        <a class="brand" href="index.html">
          <img class="brand__icon" src="assets/appIcon.png" alt="Omni app icon" />
          <span class="brand__text">Omni</span>
        </a>
        <nav class="topbar__nav">
          <a href="index.html#features" class="nav-link">Features</a>
          <a href="index.html#pricing" class="nav-link">Pricing</a>
          <a href="index.html">Home</a>
        </nav>
        <a class="cta cta--ghost" href="index.html#download">Get the App</a>
      </div>
    </header>

    <main class="hero" style="padding-top: 60px;">
      <div class="container">
        <p class="eyebrow">Gallery</p>
        <h1>Omni Screenshot Showcase</h1>
        <p class="lead">Scroll to preview all available Omni screenshots in one place.</p>

        <div class="showcase-scroll" aria-label="Scrollable screenshots gallery">
          <div class="screens__grid">
            <figure class="screen-shot">
              <img src="assets/screenshots/dashboard.png" alt="Omni dashboard screenshot" loading="lazy" />
              <figcaption>Dashboard</figcaption>
            </figure>
            <figure class="screen-shot">
              <img src="assets/screenshots/dashboardDark.png" alt="Omni dashboard dark mode screenshot" loading="lazy" />
              <figcaption>Dashboard Dark</figcaption>
            </figure>
            <figure class="screen-shot">
              <img src="assets/screenshots/quiz.png" alt="Omni quiz screenshot" loading="lazy" />
              <figcaption>Quiz</figcaption>
            </figure>
            <figure class="screen-shot">
              <img src="assets/screenshots/flashcards.png" alt="Omni flashcards screenshot" loading="lazy" />
              <figcaption>Flashcards</figcaption>
            </figure>
            <figure class="screen-shot">
              <img src="assets/screenshots/settings.png" alt="Omni settings screenshot" loading="lazy" />
              <figcaption>Settings</figcaption>
            </figure>
            <figure class="screen-shot">
              <img src="assets/screenshots/mindMap.png" alt="Omni mind map screenshot" loading="lazy" />
              <figcaption>Mind Map</figcaption>
            </figure>
            <figure class="screen-shot">
              <img src="assets/screenshots/qna.png" alt="Omni Q and A screenshot" loading="lazy" />
              <figcaption>Q&amp;A</figcaption>
            </figure>
            <figure class="screen-shot">
              <img src="assets/screenshots/deepAnalysis.png" alt="Omni deep analysis screenshot" loading="lazy" />
              <figcaption>Deep Analysis</figcaption>
            </figure>
            <figure class="screen-shot">
              <img src="assets/screenshots/docWebAudioFileSupport.png" alt="Omni document web and audio support screenshot" loading="lazy" />
              <figcaption>Doc, Web, Audio Support</figcaption>
            </figure>
            <figure class="screen-shot">
              <img src="assets/screenshots/liveAudioAnalysis.png" alt="Omni live audio analysis screenshot" loading="lazy" />
              <figcaption>Live Audio Analysis</figcaption>
            </figure>
          </div>
        </div>
      </div>
    </main>
  </body>
</html>
